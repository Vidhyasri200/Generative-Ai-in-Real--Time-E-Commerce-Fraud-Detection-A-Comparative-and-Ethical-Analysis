<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Ecommerce Fraud Detection</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0d1b2a, #1b263b);
            color: #e0e0e0;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/circuit-board.png') repeat;
            opacity: 0.1;
            z-index: -1;
        }
        header {
            background: linear-gradient(135deg, #2a4d69, #4b86b4);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid #00d4ff;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .navbar h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }
        .navbar ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }
        .navbar ul li a {
            color: #e0e0e0;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: all 0.3s ease;
            position: relative;
        }
        .navbar ul li a:hover {
            background-color: #00d4ff;
            color: #0d1b2a;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
        }
        .navbar ul li a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: #00d4ff;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }
        .navbar ul li a:hover::after {
            width: 80%;
        }
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
            flex: 1;
            background: rgba(27, 38, 59, 0.8);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .alert {
            background: rgba(0, 212, 255, 0.2);
            color: #e0e0e0;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 5px;
            border: 1px solid #00d4ff;
            text-align: center;
        }
        footer {
            text-align: center;
            padding: 1.5rem 0;
            background: linear-gradient(135deg, #0d1b2a, #1b263b);
            color: #b0c4de;
            border-top: 1px solid #00d4ff;
            width: 100%;
            margin-top: auto;
        }
        footer p {
            font-size: 0.95rem;
            font-weight: 300;
        }
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                padding: 1rem;
            }
            .navbar h1 {
                font-size: 1.8rem;
            }
            .navbar ul {
                flex-direction: column;
                gap: 1rem;
                margin-top: 1rem;
            }
            .navbar ul li a {
                font-size: 1rem;
            }
            .container {
                margin: 1rem;
                padding: 1rem;
            }
        }
        @media (max-width: 480px) {
            .navbar h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="navbar">
            <h1>Ecommerce Fraud Detection</h1>
            <ul>
                <li><a href="{% url 'UserHome' %}">Home</a></li>
                <li><a href="{% url 'train_models' %}">Train Models</a></li>
                <li><a href="{% url 'predict_fraud' %}">Predict Fraud</a></li>
                <li><a href="{% url 'base' %}">Logout</a></li>
            </ul>
        </div>
    </header>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block content %}
        <!-- Page-specific content will be inserted here -->
        {% endblock %}
    </div>

    <footer>
        <p>© 2025 Ecommerce Fraud Detection System. All rights reserved.</p>
    </footer>
</body>
</html>
