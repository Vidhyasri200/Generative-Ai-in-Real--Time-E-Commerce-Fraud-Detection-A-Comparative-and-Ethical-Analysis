{% extends 'users/Userbase.html' %}

{% block content %}
<style>
    .user-home-box {
        background: rgba(27, 38, 59, 0.9);
        padding: 2rem;
        margin: 2rem auto;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        text-align: center;
        max-width: 800px;
    }

    .user-home-box h2 {
        color: #00d4ff;
        font-size: 2rem;
        margin-bottom: 1rem;
        text-shadow: 0 0 5px rgba(0, 212, 255, 0.5);
    }

    .user-home-box p {
        font-size: 1.1rem;
        color: #b0c4de;
        margin-bottom: 2rem;
    }

    .user-home-box .btn {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        margin: 0.5rem;
        font-weight: 500;
        background-color: #00d4ff;
        color: #0d1b2a;
        text-decoration: none;
        border-radius: 6px;
        transition: all 0.3s ease;
    }

    .user-home-box .btn:hover {
        background-color: #b0c4de;
        box-shadow: 0 0 10px rgba(0, 212, 255, 0.7);
        transform: translateY(-2px);
    }

    @media (max-width: 768px) {
        .user-home-box {
            padding: 1.5rem;
        }

        .user-home-box h2 {
            font-size: 1.8rem;
        }

        .user-home-box p {
            font-size: 1rem;
        }

        .user-home-box .btn {
            width: 100%;
            margin-bottom: 0.75rem;
        }
    }

    @media (max-width: 480px) {
        .user-home-box h2 {
            font-size: 1.6rem;
        }

        .user-home-box p {
            font-size: 0.95rem;
        }
    }
</style>

<div class="user-home-box">
    <h2>Welcome, {{ request.session.loggeduser }}</h2>
    <p>Use the options below to access our AI-powered fraud detection tools and monitor your ecommerce transactions.</p>
    
    <a href="{% url 'predict_fraud' %}" class="btn">Predict Fraud</a>
    <a href="{% url 'base' %}" class="btn">Logout</a>
</div>
{% endblock %}
